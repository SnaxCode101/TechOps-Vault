<style>
  :root { --bg:#0d1117;--surface:#161b22;--border:#30363d;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#a371f7;--orange:#f0883e;--text:#e6edf3;--muted:#8b949e; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:24px}
  h1{font-size:1.6rem;color:var(--accent);margin-bottom:4px}
  .subtitle{color:var(--muted);font-size:.85rem;margin-bottom:20px}
  #searchBox{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1rem;outline:none;transition:border-color .2s}
  #searchBox:focus{border-color:var(--accent)}
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
  .filter-btn{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:.8rem;transition:all .2s}
  .filter-btn:hover{border-color:var(--accent);color:var(--text)}
  .filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(88,166,255,.1)}
  .filter-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
  .stats{font-size:.8rem;color:var(--muted);margin-bottom:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:border-color .2s,transform .1s;position:relative}
  .card:hover{border-color:var(--accent);transform:translateY(-1px)}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .card-folder{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .copy-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;font-size:.72rem;padding:2px 6px;transition:all .2s;line-height:1.4;flex-shrink:0}
  .copy-btn:hover{border-color:var(--accent);color:var(--accent)}
  .card-title{font-size:.95rem;font-weight:600;margin-bottom:6px}
  .card-desc{font-size:.8rem;color:var(--muted);line-height:1.4;margin-bottom:8px}
  .tags{display:flex;flex-wrap:wrap;gap:4px}
  .tag{font-size:.68rem;padding:2px 7px;border-radius:10px;background:rgba(88,166,255,.12);color:var(--accent)}
  .open-hint{font-size:.68rem;color:var(--muted);margin-top:8px;opacity:0;transition:opacity .15s}
  .card:hover .open-hint{opacity:1}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:6px;font-size:.85rem;display:none;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.4)}
  .f01{border-left:3px solid #3B82F6}
  .f02{border-left:3px solid #14B8A6}
  .f03{border-left:3px solid #22C55E}
  .f04{border-left:3px solid #8B5CF6}
  .f05{border-left:3px solid #F97316}
  .f06{border-left:3px solid #EF4444}
  .f07{border-left:3px solid #EC4899}
  .f08{border-left:3px solid #84CC16}
  .no-results{text-align:center;padding:48px;color:var(--muted)}
</style>
</head>

const FOLDER_COLORS_HEX={
  '01-Fundamentals':'#3B82F6',
  '02-Tools':'#14B8A6',
  '03-Labs':'#22C55E',
  '04-CTF':'#8B5CF6',
  '05-Certs':'#F97316',
  '06-Reference':'#EF4444',
  '07-Projects':'#EC4899',
  '08-Learning-Log':'#84CC16'
};

const FOLDER_COLORS={'01-Fundamentals':'f01','02-Tools':'f02','03-Labs':'f03','04-CTF':'f04','05-Certs':'f05','06-Reference':'f06','07-Projects':'f07','08-Learning-Log':'f08'};
const FOLDERS=[...new Set(NOTES.map(n=>n.folder))];
let activeFolder=null;
let toastTimer=null;

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.display='block';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.style.display='none',2000);
}

function openNote(folder,file){
  const path=encodeURIComponent(folder+'/'+file);
  window.open('obsidian://open?vault=SecOps-Vault&file='+path,'_self');
  showToast('Opening '+file.replace(/-/g,' ')+'…');
}

function copyLink(event,folder,file){
  event.stopPropagation();
  const wikilink='[['+folder+'/'+file+']]';
  navigator.clipboard.writeText(wikilink).then(()=>showToast('✅ Wikilink copied!'));
}

function render(filter='',folder=null){
  const q=filter.toLowerCase().trim();
  const results=NOTES.filter(n=>{
    const inFolder=!folder||n.folder===folder;
    if(!q)return inFolder;
    return inFolder&&(n.title.toLowerCase().includes(q)||n.desc.toLowerCase().includes(q)||n.tags.some(t=>t.toLowerCase().includes(q))||n.file.toLowerCase().includes(q));
  });
  document.getElementById('stats').textContent='Showing '+results.length+' of '+NOTES.length+' notes';
  const grid=document.getElementById('grid');
  if(results.length===0){grid.innerHTML='<div class="no-results">No notes match your search.</div>';return;}
  grid.innerHTML=results.map(n=>`
    <div class="card ${FOLDER_COLORS[n.folder]||''}" onclick="openNote('${n.folder}','${n.file}')">
      <div class="card-header">
        <div class="card-folder">${n.folder}</div>
        <button class="copy-btn" onclick="copyLink(event,'${n.folder}','${n.file}')" title="Copy [[wikilink]]">⧉</button>
      </div>
      <div class="card-title">${n.title}</div>
      <div class="card-desc">${n.desc}</div>
      <div class="tags">${n.tags.slice(0,6).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="open-hint">↗ Click to open in Obsidian</div>
    </div>`).join('');
}

function buildFilters(){
  const div=document.getElementById('filters');
  const allBtn='<button class="filter-btn active" onclick="setFolder(null,this)">All ('+NOTES.length+')</button>';
  const folderBtns=FOLDERS.map(f=>{
    const color=FOLDER_COLORS_HEX[f]||'';
    const dot=color?`<span class="filter-dot" style="background:${color}"></span>`:'';
    const count=NOTES.filter(n=>n.folder===f).length;
    return `<button class="filter-btn" onclick="setFolder('${f}',this)">${dot}${f} (${count})</button>`;
  }).join('');
  div.innerHTML=allBtn+folderBtns;
}

function setFolder(f,btn){
  activeFolder=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(document.getElementById('searchBox').value,f);
}

document.getElementById('searchBox').addEventListener('input',e=>render(e.target.value,activeFolder));
buildFilters();
render();
</script>
